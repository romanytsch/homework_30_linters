stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: 
    files:
      - requirements.txt
  paths:
    - .cache/pip/
    - **/__pycache__/

lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install ruff
    - ruff check .
    - ruff format --check .
  cache:
    paths:
      - .cache/pip/

test:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:16
      alias: db
  script:
    - pip install -r requirements.txt
    - pytest -v
  cache:
    paths:
      - .cache/pip/
