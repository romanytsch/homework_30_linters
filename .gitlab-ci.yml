stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: 
    files:
      - requirements.txt
  paths:
    - .cache/pip/
    - "**/__pycache__/"

lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install ruff
  script:
    - ruff check .
    - ruff format --check .
  cache:
    paths:
      - .cache/pip/

test:
  stage: test
  image: python:3.12-slim
  # УБИРАЕМ PostgreSQL - используем SQLite как в main.py
  before_script:
    - pip install -r requirements.txt
  script:
    - pytest -v
  cache:
    paths:
      - .cache/pip/
